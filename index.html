<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Routine Video Player & Calendar</title>
  <style>
    :root {
      --main-color: #00A474;
      --bg-color: #121212;
      --panel-bg: #1A1A1A;
      --item-bg: #262626;
      --text-color: #FFFFFF;
      --text-muted: #AAAAAA;
      --border-color: #2D2D2D;
    }

    body {
      margin: 0;
      padding: 0;
      background-color: var(--bg-color);
      color: var(--text-color);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
      display: flex;
      height: 100vh;
      overflow: hidden;
    }

    /* 左側：サイドバー */
    .sidebar {
      width: 350px;
      background-color: var(--panel-bg);
      border-right: 1px solid var(--border-color);
      padding: 25px 20px;
      box-sizing: border-box;
      display: flex;
      flex-direction: column;
      gap: 25px;
      overflow-y: auto;
    }

    /* タイトルとクマの配置 */
    .routine-header {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 5px;
    }

    .routine-bear {
      width: 40px;
      height: 40px;
      object-fit: contain;
    }

    .routine-header h2 {
      font-size: 1rem;
      color: var(--main-color); 
      margin: 0;
      letter-spacing: 1px;
      font-weight: 600;
    }

    /* 今日の気分（ムード）選択エリア */
    .mood-selector {
      background-color: var(--item-bg);
      padding: 20px 15px;
      border-radius: 10px;
      text-align: center;
    }

    .mood-prompt {
      margin: 0 0 15px 0;
      font-size: 0.9rem;
      color: var(--text-muted);
      font-weight: 500;
    }

    .mood-buttons {
      display: flex;
      justify-content: center;
      gap: 15px;
    }

    .mood-btn {
      background-color: #333333;
      border: 2px solid transparent;
      border-radius: 50%;
      width: 60px;
      height: 60px;
      font-size: 1.8rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
      padding: 0;
    }

    .mood-btn:hover {
      transform: scale(1.1);
      background-color: #444444;
    }

    /* カレンダーカード */
    .calendar-card {
      background-color: var(--item-bg);
      padding: 15px;
      border-radius: 10px;
    }

    .calendar-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 15px;
    }

    .calendar-header h3 {
      margin: 0;
      font-size: 0.95rem;
      font-weight: 600;
    }

    .calendar-header button {
      background: none;
      border: none;
      color: var(--main-color);
      cursor: pointer;
      font-size: 1rem;
      padding: 5px 10px;
    }

    .calendar-grid {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 6px;
      text-align: center;
      font-size: 0.8rem;
    }

    .weekday {
      color: var(--text-muted);
      font-weight: 600;
      padding-bottom: 5px;
    }

    .day {
      aspect-ratio: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 6px;
      background-color: var(--panel-bg);
      font-weight: 500;
      background-size: cover;
      background-position: center;
      transition: all 0.3s ease;
    }

    .day.today {
      border: 1px solid var(--main-color);
      color: var(--main-color);
      font-weight: 700;
    }

    /* ポンッと出現するアニメーション用 */
    @keyframes popIn {
      0% { transform: scale(0.5); opacity: 0; }
      70% { transform: scale(1.1); }
      100% { transform: scale(1); opacity: 1; }
    }

    .day.stamped {
      animation: popIn 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
      color: transparent;
    }

    /* 右側：メインコンテンツ */
    .main-content {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      position: relative;
      padding: 30px;
      box-sizing: border-box;
    }

    .player-container {
      width: 100%;
      max-width: 850px;
      text-align: center;
    }

    #currentTitle {
      font-size: 1rem;
      margin-bottom: 15px;
      color: var(--text-muted);
      height: 1.5rem;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      padding: 0 10px;
    }

    .video-wrapper {
      position: relative;
      width: 100%;
      background-color: #000000;
      border-radius: 12px;
      overflow: hidden;
      box-shadow: 0 10px 30px rgba(0,0,0,0.5);
      aspect-ratio: 16 / 9;
    }

    video {
      width: 100%;
      height: 100%;
      display: block;
      object-fit: contain;
    }

    /* 🔒 ロック画面 */
    .lock-overlay {
      position: absolute;
      top: 0; left: 0; width: 100%; height: 100%;
      background-color: rgba(18, 18, 18, 0.98);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 10;
      transition: opacity 0.8s ease;
      padding: 20px;
      box-sizing: border-box;
    }

    .lock-overlay.unlocked {
      opacity: 0;
      pointer-events: none;
    }

    .lock-message {
      text-align: center;
      font-size: 1rem;
      color: var(--text-muted);
      line-height: 1.6;
      transition: all 0.3s ease;
    }

    .lock-icon {
      font-size: 2.5rem;
      margin-bottom: 15px;
      color: var(--main-color);
      transition: all 0.3s ease;
    }

    /* コントロール群 */
    .controls {
      margin-top: 25px;
      display: flex;
      flex-direction: column;
      gap: 15px;
      align-items: center;
    }

    .btn-group {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      justify-content: center;
    }

    button.control-btn, label.file-label {
      background-color: var(--item-bg);
      color: var(--text-color);
      border: 1px solid #383838;
      padding: 10px 20px;
      border-radius: 20px;
      cursor: pointer;
      font-size: 0.85rem;
      font-weight: 500;
      transition: all 0.2s ease;
      display: inline-flex;
      align-items: center;
      justify-content: center;
    }

    button.control-btn:hover, label.file-label:hover {
      background-color: #333333;
      border-color: #555555;
    }

    button.control-btn.active {
      background-color: var(--main-color);
      border-color: var(--main-color);
      color: #ffffff;
    }

    .nav-btn {
      min-width: 70px;
    }

    input[type="file"] {
      display: none;
    }

    /* レスポンシブ対応 */
    @media (max-width: 768px) {
      body {
        flex-direction: column;
        overflow-y: auto;
        height: auto;
      }
      .sidebar {
        width: 100%;
        height: auto;
        border-right: none;
        border-bottom: 1px solid var(--border-color);
        padding: 20px;
        box-sizing: border-box;
      }
      .main-content {
        width: 100%;
        height: auto;
        padding: 20px;
        box-sizing: border-box;
      }
    }
  </style>
</head>
<body>

  <!-- 左側：サイドバー -->
  <div class="sidebar">
    <div>
      <!-- クマ画像をタイトルの前に配置 -->
      <div class="routine-header">
        <img src="mascot-tam-walk2504.png" alt="Bear" class="routine-bear">
        <h2>TONIGHT'S ROUTINE</h2>
      </div>
      
      <!-- 気分選択エリア -->
      <div class="mood-selector">
        <p class="mood-prompt" id="moodPrompt">今の気分を教えてください</p>
        <div class="mood-buttons" id="moodButtons">
          <button class="mood-btn" onclick="unlockTheater('😆')">😆</button>
          <button class="mood-btn" onclick="unlockTheater('😌')">😌</button>
          <button class="mood-btn" onclick="unlockTheater('🫠')">🫠</button>
        </div>
      </div>
    </div>

    <!-- カレンダーカード -->
    <div class="calendar-card">
      <div class="calendar-header">
        <button onclick="prevMonth()">◀</button>
        <h3 id="calendarTitle"></h3>
        <button onclick="nextMonth()">▶</button>
      </div>
      <div class="calendar-grid" id="calendarGrid"></div>
    </div>
  </div>

  <!-- 右側：メインコンテンツ -->
  <div class="main-content">
    <div class="player-container">
      <div id="currentTitle">動画を選択してください</div>
      
      <div class="video-wrapper">
        <div class="lock-overlay" id="lockOverlay">
          <div class="lock-icon" id="lockIcon">🔒</div>
          <div class="lock-message" id="lockMessage">
            今日の気分を選ぶと<br>
            シアタールームが解放されます
          </div>
        </div>
        <video id="videoPlayer" controls></video>
      </div>
      
      <div class="controls">
        <div class="btn-group">
          <button class="control-btn nav-btn" id="prevBtn">◀ 前へ</button>
          <label class="file-label">
            動画を選択
            <input type="file" id="fileInput" multiple accept="video/*">
          </label>
          <button class="control-btn nav-btn" id="nextBtn">次へ ▶</button>
        </div>
        <div class="btn-group">
          <button class="control-btn" id="loopBtn">全曲リピート OFF</button>
        </div>
      </div>
    </div>
  </div>

  <script>
    // ==========================================
    // 1. 状態管理（カレンダー・ロック解除）
    // ==========================================
    const todayDate = new Date();
    let currentYear = todayDate.getFullYear();
    let currentMonth = todayDate.getMonth(); 
    let completedDates = {};

    // 10枚の写真ファイル名リスト（p1.jpg 〜 p10.jpg）
    const totalPhotos = 10;
    const photoList = [];
    for(let i = 1; i <= totalPhotos; i++) {
      photoList.push(`p${i}.jpg`);
    }

    // 保存されている進捗データの復元
    if (localStorage.getItem('routineLog')) {
      completedDates = JSON.parse(localStorage.getItem('routineLog'));
    }

    // 気分を選んでロック解除＆写真出現させる関数
    function unlockTheater(moodEmoji) {
      const today = new Date();
      const dateKey = `${today.getFullYear()}-${today.getMonth()}-${today.getDate()}`;
      
      const lockOverlay = document.getElementById('lockOverlay');
      const lockIcon = document.getElementById('lockIcon');
      const lockMessage = document.getElementById('lockMessage');
      const moodPrompt = document.getElementById('moodPrompt');
      const moodButtons = document.getElementById('moodButtons');

      // 今日の写真がまだ決まっていなければランダムで1枚引いて保存
      if (!completedDates[dateKey]) {
        const randomIndex = Math.floor(Math.random() * photoList.length);
        completedDates[dateKey] = photoList[randomIndex];
        localStorage.setItem('routineLog', JSON.stringify(completedDates));
      }

      // カレンダーを更新（写真がポンッと出る）
      renderCalendar();

      // サイドバーのUI変化
      moodPrompt.innerText = "今日もお疲れ様でした！";
      moodButtons.style.pointerEvents = 'none'; // 連打防止
      moodButtons.style.opacity = '0.5';

      // ロック解除のアニメーション演出
      lockIcon.innerText = '🔓';
      
      if (moodEmoji === '😆') {
        lockMessage.innerHTML = 'いい一日でしたね！<br>さあ、楽しい時間の始まりです✨';
      } else if (moodEmoji === '😌') {
        lockMessage.innerHTML = 'ゆっくり深呼吸。<br>リラックスしてお楽しみください☕️';
      } else if (moodEmoji === '🫠') {
        lockMessage.innerHTML = '今日はいっぱい頑張りましたね。<br>頭を空っぽにして癒やされてください🌿';
      } else {
        lockMessage.innerHTML = '今日もお疲れ様でした。<br>ゆっくりお楽しみください✨';
      }

      // メッセージを読ませるために1秒ちょっと待ってからフェードアウト
      setTimeout(() => {
        lockOverlay.classList.add('unlocked');
      }, 1500);
    }

    // カレンダーの描画
    function renderCalendar() {
      const grid = document.getElementById('calendarGrid');
      const title = document.getElementById('calendarTitle');
      grid.innerHTML = '';

      title.innerText = `${currentYear}年 ${currentMonth + 1}月`;

      const weekdays = ['日', '月', '火', '水', '木', '金', '土'];
      weekdays.forEach(w => {
        const div = document.createElement('div');
        div.className = 'weekday';
        div.innerText = w;
        grid.appendChild(div);
      });

      const firstDay = new Date(currentYear, currentMonth, 1).getDay();
      const totalDays = new Date(currentYear, currentMonth + 1, 0).getDate();
      const today = new Date();
      const todayKey = `${today.getFullYear()}-${today.getMonth()}-${today.getDate()}`;

      for (let i = 0; i < firstDay; i++) {
        const empty = document.createElement('div');
        grid.appendChild(empty);
      }

      for (let day = 1; day <= totalDays; day++) {
        const dayDiv = document.createElement('div');
        dayDiv.className = 'day';
        dayDiv.innerText = day;

        const dateKey = `${currentYear}-${currentMonth}-${day}`;
        const savedPhoto = completedDates[dateKey];
        
        if (currentYear === today.getFullYear() && currentMonth === today.getMonth() && day === today.getDate()) {
          dayDiv.classList.add('today');
        }

        // その日に保存された写真があれば表示する
        if (savedPhoto) {
          if (savedPhoto === true || savedPhoto.includes('stamp-bear')) {
            dayDiv.style.backgroundImage = `url('p1.jpg')`;
          } else {
            dayDiv.style.backgroundImage = `url('${savedPhoto}')`;
          }
          dayDiv.classList.add('stamped'); // 出現アニメーション用クラス
        }

        grid.appendChild(dayDiv);
      }
    }

    function prevMonth() {
      currentMonth--;
      if (currentMonth < 0) { currentMonth = 11; currentYear--; }
      renderCalendar();
    }

    function nextMonth() {
      currentMonth++;
      if (currentMonth > 11) { currentMonth = 0; currentYear++; }
      renderCalendar();
    }

    // 初期化：もし今日すでに解除済みなら、最初からロックを外しておく
    function checkTodayStatus() {
      const today = new Date();
      const dateKey = `${today.getFullYear()}-${today.getMonth()}-${today.getDate()}`;
      if (completedDates[dateKey]) {
        document.getElementById('lockOverlay').classList.add('unlocked');
        document.getElementById('moodPrompt').innerText = "今日もごゆっくりどうぞ☕️";
        document.getElementById('moodButtons').style.pointerEvents = 'none';
        document.getElementById('moodButtons').style.opacity = '0.5';
      }
      renderCalendar();
    }

    checkTodayStatus();

    // ==========================================
    // 2. 動画プレイヤー・ロジック
    // ==========================================
    const fileInput = document.getElementById('fileInput');
    const videoPlayer = document.getElementById('videoPlayer');
    const currentTitle = document.getElementById('currentTitle');
    const loopBtn = document.getElementById('loopBtn');
    const prevBtn = document.getElementById('prevBtn');
    const nextBtn = document.getElementById('nextBtn');

    let videoFiles = [];
    let currentIndex = 0;
    let isLoopAll = false;

    fileInput.addEventListener('change', function(e) {
      if (this.files && this.files.length > 0) {
        videoFiles = Array.from(this.files);
        currentIndex = 0;
        playVideo(currentIndex);
      }
    });

    function playVideo(index) {
      if (videoFiles.length === 0 || index < 0 || index >= videoFiles.length) return;
      currentIndex = index;
      const file = videoFiles[currentIndex];
      if (videoPlayer.src) URL.revokeObjectURL(videoPlayer.src);
      videoPlayer.src = URL.createObjectURL(file);
      currentTitle.innerText = `再生中 🎬 (${currentIndex + 1}/${videoFiles.length}): ${file.name}`;
      videoPlayer.play().catch(err => {
        console.log("自動再生ブロック待ち:", err);
      });
    }

    function nextVideo() {
      if (videoFiles.length === 0) return;
      if (currentIndex + 1 < videoFiles.length) {
        playVideo(currentIndex + 1);
      } else if (isLoopAll) {
        playVideo(0);
      } else {
        currentTitle.innerText = "すべての動画の再生が終了しました 🌟";
      }
    }

    function prevVideo() {
      if (videoFiles.length === 0) return;
      if (currentIndex - 1 >= 0) {
        playVideo(currentIndex - 1);
      } else if (isLoopAll) {
        playVideo(videoFiles.length - 1);
      }
    }

    videoPlayer.addEventListener('ended', nextVideo);
    prevBtn.addEventListener('click', prevVideo);
    nextBtn.addEventListener('click', nextVideo);

    loopBtn.addEventListener('click', () => {
      isLoopAll = !isLoopAll;
      loopBtn.innerText = isLoopAll ? "全曲リピート ON" : "全曲リピート OFF";
      loopBtn.classList.toggle('active', isLoopAll);
    });
  </script>
</body>
</html>
