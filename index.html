<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Routine Video Player & Calendar</title>
  <style>
    :root {
      --main-color: #00A474;
      --bg-color: #121212;
      --panel-bg: #1A1A1A;
      --item-bg: #262626;
      --text-color: #FFFFFF;
      --text-muted: #AAAAAA;
      --border-color: #2D2D2D;
    }

    body {
      margin: 0;
      padding: 0;
      background-color: var(--bg-color);
      color: var(--text-color);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
      display: flex;
      height: 100vh;
      overflow: hidden;
    }

    /* 左側：サイドバー */
    .sidebar {
      width: 350px;
      background-color: var(--panel-bg);
      border-right: 1px solid var(--border-color);
      padding: 25px 20px;
      box-sizing: border-box;
      display: flex;
      flex-direction: column;
      gap: 25px;
      overflow-y: auto;
    }

    /* タイトルとクマの配置 */
    .routine-header {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 15px;
    }

    .routine-bear {
      width: 40px;
      height: 40px;
      object-fit: contain;
    }

    .routine-header h2 {
      font-size: 1rem;
      color: var(--main-color); 
      margin: 0;
      letter-spacing: 1px;
      font-weight: 600;
    }

    /* タスクリスト */
    .task-list {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .task-item {
      display: flex;
      align-items: center;
      background-color: var(--item-bg);
      padding: 14px 15px;
      border-radius: 10px;
      cursor: pointer;
      transition: background 0.2s;
    }

    .task-item:hover {
      background-color: #323232;
    }

    .task-item input[type="checkbox"] {
      margin-right: 15px;
      width: 20px;
      height: 20px;
      accent-color: var(--main-color);
      cursor: pointer;
    }

    .task-text {
      font-size: 0.95rem;
      font-weight: 500;
    }

    /* カレンダーカード */
    .calendar-card {
      background-color: var(--item-bg);
      padding: 15px;
      border-radius: 10px;
    }

    .calendar-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 15px;
    }

    .calendar-header h3 {
      margin: 0;
      font-size: 0.95rem;
      font-weight: 600;
    }

    .calendar-header button {
      background: none;
      border: none;
      color: var(--main-color);
      cursor: pointer;
      font-size: 1rem;
      padding: 5px 10px;
    }

    .calendar-grid {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 6px;
      text-align: center;
      font-size: 0.8rem;
    }

    .weekday {
      color: var(--text-muted);
      font-weight: 600;
      padding-bottom: 5px;
    }

    .day {
      aspect-ratio: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 6px;
      background-color: var(--panel-bg);
      font-weight: 500;
      background-size: cover;
      background-position: center;
    }

    .day.today {
      border: 1px solid var(--main-color);
      color: var(--main-color);
      font-weight: 700;
    }

    /* 右側：メインコンテンツ */
    .main-content {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      position: relative;
      padding: 30px;
      box-sizing: border-box;
    }

    .player-container {
      width: 100%;
      max-width: 850px;
      text-align: center;
    }

    #currentTitle {
      font-size: 1rem;
      margin-bottom: 15px;
      color: var(--text-muted);
      height: 1.5rem;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      padding: 0 10px;
    }

    .video-wrapper {
      position: relative;
      width: 100%;
      background-color: #000000;
      border-radius: 12px;
      overflow: hidden;
      box-shadow: 0 10px 30px rgba(0,0,0,0.5);
      aspect-ratio: 16 / 9;
    }

    video {
      width: 100%;
      height: 100%;
      display: block;
      object-fit: contain;
    }

    /* 🔒 ロック画面 */
    .lock-overlay {
      position: absolute;
      top: 0; left: 0; width: 100%; height: 100%;
      background-color: rgba(18, 18, 18, 0.98);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 10;
      transition: opacity 0.4s ease;
      padding: 20px;
      box-sizing: border-box;
    }

    .lock-overlay.unlocked {
      opacity: 0;
      pointer-events: none;
    }

    .lock-message {
      text-align: center;
      font-size: 0.95rem;
      color: var(--text-muted);
      line-height: 1.5;
    }

    .lock-icon {
      font-size: 2.2rem;
      margin-bottom: 10px;
      color: var(--main-color);
    }

    /* コントロール群 */
    .controls {
      margin-top: 25px;
      display: flex;
      flex-direction: column;
      gap: 15px;
      align-items: center;
    }

    .btn-group {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      justify-content: center;
    }

    button.control-btn, label.file-label {
      background-color: var(--item-bg);
      color: var(--text-color);
      border: 1px solid #383838;
      padding: 10px 20px;
      border-radius: 20px;
      cursor: pointer;
      font-size: 0.85rem;
      font-weight: 500;
      transition: all 0.2s ease;
      display: inline-flex;
      align-items: center;
      justify-content: center;
    }

    button.control-btn:hover, label.file-label:hover {
      background-color: #333333;
      border-color: #555555;
    }

    button.control-btn.active {
      background-color: var(--main-color);
      border-color: var(--main-color);
      color: #ffffff;
    }

    .nav-btn {
      min-width: 70px;
    }

    input[type="file"] {
      display: none;
    }

    /* レスポンシブ対応 */
    @media (max-width: 768px) {
      body {
        flex-direction: column;
        overflow-y: auto;
        height: auto;
      }
      .sidebar {
        width: 100%;
        height: auto;
        border-right: none;
        border-bottom: 1px solid var(--border-color);
        padding: 20px;
        box-sizing: border-box;
      }
      .main-content {
        width: 100%;
        height: auto;
        padding: 20px;
        box-sizing: border-box;
      }
    }
  </style>
</head>
<body>

  <div class="sidebar">
    <div>
      <div class="routine-header">
        <img src="mascot-tam-walk2504.png" alt="Bear" class="routine-bear">
        <h2>TONIGHT'S ROUTINE</h2>
      </div>
      <div class="task-list">
        <label class="task-item">
          <input type="checkbox" id="task-english" onchange="checkProgress()">
          <span class="task-text">📚 夜の英語学習</span>
        </label>
        <label class="task-item">
          <input type="checkbox" id="task-reading" onchange="checkProgress()">
          <span class="task-text">📖 読書タイム</span>
        </label>
      </div>
    </div>

    <div class="calendar-card">
      <div class="calendar-header">
        <button onclick="prevMonth()">◀</button>
        <h3 id="calendarTitle"></h3>
        <button onclick="nextMonth()">▶</button>
      </div>
      <div class="calendar-grid" id="calendarGrid"></div>
    </div>
  </div>

  <div class="main-content">
    <div class="player-container">
      <div id="currentTitle">動画を選択してください</div>
      
      <div class="video-wrapper">
        <div class="lock-overlay" id="lockOverlay">
          <div class="lock-icon">🔒</div>
          <div class="lock-message">
            夜のルーティンを完了すると<br>
            シアタールームが解放されます！✨
          </div>
        </div>
        <video id="videoPlayer" controls></video>
      </div>
      
      <div class="controls">
        <div class="btn-group">
          <button class="control-btn nav-btn" id="prevBtn">◀ 前へ</button>
          <label class="file-label">
            動画を選択
            <input type="file" id="fileInput" multiple accept="video/*">
          </label>
          <button class="control-btn nav-btn" id="nextBtn">次へ ▶</button>
        </div>
        <div class="btn-group">
          <button class="control-btn" id="loopBtn">全曲リピート OFF</button>
        </div>
      </div>
    </div>
  </div>

  <script>
    // ==========================================
    // 1. 状態管理（カレンダー機能）
    // ==========================================
    const todayDate = new Date();
    let currentYear = todayDate.getFullYear();
    let currentMonth = todayDate.getMonth(); 
    let completedDates = {};

    // 10枚の写真ファイル名リスト（p1.jpg 〜 p10.jpg）
    const totalPhotos = 10;
    const photoList = [];
    for(let i = 1; i <= totalPhotos; i++) {
      photoList.push(`p${i}.jpg`);
    }

    // 保存されている進捗データの復元
    if (localStorage.getItem('routineLog')) {
      completedDates = JSON.parse(localStorage.getItem('routineLog'));
    }

    // 進捗チェックとランダム写真の抽選
    function checkProgress() {
      const englishDone = document.getElementById('task-english').checked;
      const readingDone = document.getElementById('task-reading').checked;
      const lockOverlay = document.getElementById('lockOverlay');

      const today = new Date();
      const dateKey = `${today.getFullYear()}-${today.getMonth()}-${today.getDate()}`;

      // 両方クリアした時の処理
      if (englishDone && readingDone) {
        lockOverlay.classList.add('unlocked');
        
        // 今日の写真がまだ決まっていなければ、ランダムで1枚引く
        if (!completedDates[dateKey]) {
          const randomIndex = Math.floor(Math.random() * photoList.length);
          const drawnPhoto = photoList[randomIndex];
          completedDates[dateKey] = drawnPhoto; 
        }
      } else {
        // チェックが外れた時の処理
        lockOverlay.classList.remove('unlocked');
        document.getElementById('videoPlayer').pause();
        
        // 当日の記録を消去
        if (completedDates[dateKey]) {
          delete completedDates[dateKey]; 
        }
      }

      localStorage.setItem('routineLog', JSON.stringify(completedDates));
      renderCalendar();
    }

    // カレンダーの描画
    function renderCalendar() {
      const grid = document.getElementById('calendarGrid');
      const title = document.getElementById('calendarTitle');
      grid.innerHTML = '';

      title.innerText = `${currentYear}年 ${currentMonth + 1}月`;

      const weekdays = ['日', '月', '火', '水', '木', '金', '土'];
      weekdays.forEach(w => {
        const div = document.createElement('div');
        div.className = 'weekday';
        div.innerText = w;
        grid.appendChild(div);
      });

      const firstDay = new Date(currentYear, currentMonth, 1).getDay();
      const totalDays = new Date(currentYear, currentMonth + 1, 0).getDate();
      const today = new Date();

      for (let i = 0; i < firstDay; i++) {
        const empty = document.createElement('div');
        grid.appendChild(empty);
      }

      for (let day = 1; day <= totalDays; day++) {
        const dayDiv = document.createElement('div');
        dayDiv.className = 'day';
        dayDiv.innerText = day;

        if (currentYear === today.getFullYear() && currentMonth === today.getMonth() && day === today.getDate()) {
          dayDiv.classList.add('today');
        }

        const dateKey = `${currentYear}-${currentMonth}-${day}`;
        const savedPhoto = completedDates[dateKey];
        
        // その日に保存された写真があれば表示する
        if (savedPhoto) {
          // 過去のテストデータ（クマ画像）が残っていた場合の安全策（p1.jpgを表示）
          if (savedPhoto === true || savedPhoto.includes('stamp-bear')) {
            dayDiv.style.backgroundImage = `url('p1.jpg')`;
          } else {
            // 当選した1〜10のランダム写真を表示
            dayDiv.style.backgroundImage = `url('${savedPhoto}')`;
          }
          dayDiv.style.color = 'transparent'; 
        }

        grid.appendChild(dayDiv);
      }
    }

    function prevMonth() {
      currentMonth--;
      if (currentMonth < 0) { currentMonth = 11; currentYear--; }
      renderCalendar();
    }

    function nextMonth() {
      currentMonth++;
      if (currentMonth > 11) { currentMonth = 0; currentYear++; }
      renderCalendar();
    }

    renderCalendar();

    // ==========================================
    // 2. 動画プレイヤー・ロジック
    // ==========================================
    const fileInput = document.getElementById('fileInput');
    const videoPlayer = document.getElementById('videoPlayer');
    const currentTitle = document.getElementById('currentTitle');
    const loopBtn = document.getElementById('loopBtn');
    const prevBtn = document.getElementById('prevBtn');
    const nextBtn = document.getElementById('nextBtn');

    let videoFiles = [];
    let currentIndex = 0;
    let isLoopAll = false;

    fileInput.addEventListener('change', function(e) {
      if (this.files && this.files.length > 0) {
        videoFiles = Array.from(this.files);
        currentIndex = 0;
        playVideo(currentIndex);
      }
    });

    function playVideo(index) {
      if (videoFiles.length === 0 || index < 0 || index >= videoFiles.length) return;
      currentIndex = index;
      const file = videoFiles[currentIndex];
      if (videoPlayer.src) URL.revokeObjectURL(videoPlayer.src);
      videoPlayer.src = URL.createObjectURL(file);
      currentTitle.innerText = `再生中 🎬 (${currentIndex + 1}/${videoFiles.length}): ${file.name}`;
      videoPlayer.play().catch(err => {
        console.log("自動再生ブロック待ち:", err);
      });
    }

    function nextVideo() {
      if (videoFiles.length === 0) return;
      if (currentIndex + 1 < videoFiles.length) {
        playVideo(currentIndex + 1);
      } else if (isLoopAll) {
        playVideo(0);
      } else {
        currentTitle.innerText = "すべての動画の再生が終了しました 🌟";
      }
    }

    function prevVideo() {
      if (videoFiles.length === 0) return;
      if (currentIndex - 1 >= 0) {
        playVideo(currentIndex - 1);
      } else if (isLoopAll) {
        playVideo(videoFiles.length - 1);
      }
    }

    videoPlayer.addEventListener('ended', nextVideo);
    prevBtn.addEventListener('click', prevVideo);
    nextBtn.addEventListener('click', nextVideo);

    loopBtn.addEventListener('click', () => {
      isLoopAll = !isLoopAll;
      loopBtn.innerText = isLoopAll ? "全曲リピート ON" : "全曲リピート OFF";
      loopBtn.classList.toggle('active', isLoopAll);
    });
  </script>
</body>
</html>
